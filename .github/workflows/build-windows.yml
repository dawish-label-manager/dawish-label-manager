name: Build Windows App

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Find project folder
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Path . -Recurse -Filter package.json |
            Where-Object {
              $_.FullName -notmatch "\\node_modules\\" -and
              $_.FullName -notmatch "\\release\\" -and
              $_.FullName -notmatch "\\dist\\"
            } |
            Select-Object -First 1

          if (-not $pkg) {
            Write-Host "No package.json found anywhere"
            Get-ChildItem -Force
            exit 1
          }

          $projectDir = $pkg.Directory.FullName
          Write-Host "Project folder found:"
          Write-Host $projectDir

          echo "PROJECT_DIR=$projectDir" >> $env:GITHUB_ENV

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location "$env:PROJECT_DIR"
          npm install

      - name: Build Windows installer
        shell: pwsh
        run: |
          Set-Location "$env:PROJECT_DIR"
          npm run dist

      - name: Collect installer files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\artifacts" | Out-Null

          if (Test-Path "$env:PROJECT_DIR\release") {
            Copy-Item "$env:PROJECT_DIR\release\*" "$env:GITHUB_WORKSPACE\artifacts" -Recurse -Force
          }
          elseif (Test-Path "$env:PROJECT_DIR\dist") {
            Copy-Item "$env:PROJECT_DIR\dist\*" "$env:GITHUB_WORKSPACE\artifacts" -Recurse -Force
          }
          else {
            Write-Host "No release or dist folder found"
            Get-ChildItem "$env:PROJECT_DIR" -Force
            exit 1
          }

      - name: Upload installer to Actions
        uses: actions/upload-artifact@v4
        with:
          name: Dawish-Label-Manager-Windows
          path: artifacts/**
