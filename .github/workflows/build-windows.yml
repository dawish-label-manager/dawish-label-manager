name: Build Windows App

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Detect project folder
        shell: pwsh
        run: |
          if (Test-Path "package.json") {
            echo "PROJECT_DIR=." >> $env:GITHUB_ENV
            Write-Host "Project found in repository root"
          }
          elseif (Test-Path "dawish-label-manager-desktop/package.json") {
            echo "PROJECT_DIR=dawish-label-manager-desktop" >> $env:GITHUB_ENV
            Write-Host "Project found in dawish-label-manager-desktop"
          }
          else {
            Write-Host "No package.json found"
            Get-ChildItem -Force
            exit 1
          }

      - name: Install dependencies
        shell: pwsh
        run: npm --prefix "$env:PROJECT_DIR" install

      - name: Build Windows installer
        shell: pwsh
        run: npm --prefix "$env:PROJECT_DIR" run dist

      - name: Collect installer files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          if (Test-Path "$env:PROJECT_DIR/release") {
            Copy-Item "$env:PROJECT_DIR/release/*" artifacts -Recurse -Force
          }
          elseif (Test-Path "$env:PROJECT_DIR/dist") {
            Copy-Item "$env:PROJECT_DIR/dist/*" artifacts -Recurse -Force
          }
          else {
            Write-Host "No release or dist folder found"
            Get-ChildItem "$env:PROJECT_DIR" -Force
            exit 1
          }

      - name: Upload installer to Actions
        uses: actions/upload-artifact@v4
        with:
          name: Dawish-Label-Manager-Windows
          path: artifacts/**
