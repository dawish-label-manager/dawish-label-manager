name: Build Windows App

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2025

    defaults:
      run:
        working-directory: dawish-label-manager-desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Set unique app version for this build
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $parts = $pkg.version.Split('.')
          $major = $parts[0]
          $minor = $parts[1]
          $version = "$major.$minor.${{ github.run_number }}"
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 50 | Set-Content package.json -Encoding UTF8
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "APP_TAG=v$version" >> $env:GITHUB_ENV
          Write-Host "Build version: $version"

      - name: Prepare GitHub tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags

          if (git tag -l $env:APP_TAG) {
            Write-Host "Tag already exists: $env:APP_TAG"
          } else {
            git tag $env:APP_TAG
            git push origin $env:APP_TAG
            Write-Host "Created tag: $env:APP_TAG"
          }

      - name: Build and publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Upload installer to Actions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Dawish-Label-Manager-Windows
          if-no-files-found: warn
          path: |
            dawish-label-manager-desktop/release/*.exe
            dawish-label-manager-desktop/release/*.yml
            dawish-label-manager-desktop/release/*.blockmap
